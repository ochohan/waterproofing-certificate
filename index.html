<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waterproofing Certificate Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --navy: #0f1f3d;
    --navy-mid: #1a3057;
    --gold: #c8a96e;
    --gold-light: #e8ceA0;
    --cream: #faf7f2;
    --paper: #f5f0e8;
    --ink: #1c1c1c;
    --muted: #6b6b6b;
    --border: #d4c9b8;
    --red: #c0392b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0f1f3d;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 16px 60px;
    background-image: radial-gradient(ellipse at 20% 20%, #1a3057 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 80%, #0a1628 0%, transparent 60%);
  }

  /* ── TOP BAR ── */
  .top-bar {
    width: 100%;
    max-width: 860px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .top-bar h1 {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    font-size: 1.4rem;
    letter-spacing: .04em;
  }

  .top-bar .badge {
    font-size: .72rem;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--gold-light);
    opacity: .7;
  }

  /* ── EXPORT BUTTONS ── */
  .export-row {
    width: 100%;
    max-width: 860px;
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 11px 22px;
    border: none;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: .85rem;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .2s;
  }

  .btn-pdf {
    background: var(--gold);
    color: var(--navy);
  }
  .btn-pdf:hover { background: var(--gold-light); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(200,169,110,.4); }

  .btn-img {
    background: transparent;
    color: var(--gold);
    border: 1.5px solid var(--gold);
  }
  .btn-img:hover { background: rgba(200,169,110,.08); transform: translateY(-1px); }

  .btn-reset {
    background: transparent;
    color: #aaa;
    border: 1.5px solid #334;
    margin-left: auto;
  }
  .btn-reset:hover { color: #fff; border-color: #556; }

  /* ── CERTIFICATE WRAPPER ── */
  #certificate {
    width: 100%;
    max-width: 860px;
    background: var(--cream);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(200,169,110,.15);
  }

  /* ── HEADER BAND ── */
  .cert-header {
    background: var(--navy);
    padding: 36px 52px 28px;
    position: relative;
    overflow: hidden;
    border-bottom: 3px solid var(--gold);
  }

  .cert-header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    border-radius: 50%;
    border: 40px solid rgba(200,169,110,.07);
  }

  .cert-header::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -20px;
    width: 160px; height: 160px;
    border-radius: 50%;
    border: 30px solid rgba(200,169,110,.05);
  }

  .cert-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: #fff;
    letter-spacing: .04em;
    margin-bottom: 4px;
    position: relative;
  }

  .cert-header .sub {
    font-size: .78rem;
    font-weight: 500;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--gold);
    position: relative;
  }

  /* ── CLIENT BLOCK ── */
  .client-block {
    background: var(--paper);
    border-bottom: 1px solid var(--border);
    padding: 24px 52px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px 40px;
  }

  /* ── SECTION ── */
  .cert-section {
    padding: 24px 52px;
    border-bottom: 1px solid var(--border);
  }

  .cert-section:last-child { border-bottom: none; }

  .section-label {
    font-size: .68rem;
    font-weight: 700;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--navy-mid);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .fields-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px 40px;
  }

  .fields-grid.single { grid-template-columns: 1fr; }

  /* ── FIELD ── */
  .field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .field label {
    font-size: .7rem;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .field input,
  .field textarea,
  .field select {
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--border);
    padding: 5px 0;
    font-family: 'DM Sans', sans-serif;
    font-size: .95rem;
    color: var(--ink);
    outline: none;
    transition: border-color .2s;
    width: 100%;
  }

  .field input:focus,
  .field textarea:focus,
  .field select:focus {
    border-bottom-color: var(--gold);
  }

  .field textarea {
    resize: none;
    min-height: 56px;
    line-height: 1.55;
  }

  /* ── PRODUCT TEXT BLOCKS ── */
  .product-text {
    font-size: .9rem;
    color: var(--ink);
    line-height: 1.7;
    margin-top: 8px;
  }

  /* ── WORKMANSHIP BLOCK ── */
  .workmanship-text {
    font-size: .9rem;
    color: var(--ink);
    line-height: 1.7;
    font-weight: 500;
  }

  /* ── FOOTER ── */
  .cert-footer {
    background: var(--navy);
    padding: 18px 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .cert-footer .footer-text {
    font-size: .72rem;
    color: rgba(255,255,255,.4);
    letter-spacing: .06em;
  }

  .cert-footer .stamp {
    font-family: 'Playfair Display', serif;
    font-size: .85rem;
    color: var(--gold);
    opacity: .7;
    letter-spacing: .08em;
  }

  /* ── PRINT / EXPORT HIDE ── */
  .no-print { }

  /* ── LOADING ── */
  #loading {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,20,40,.85);
    z-index: 999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
    color: var(--gold);
    font-family: 'DM Sans', sans-serif;
    font-size: .9rem;
    letter-spacing: .06em;
  }
  #loading.show { display: flex; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(200,169,110,.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    .cert-header, .cert-section, .client-block { padding-left: 24px; padding-right: 24px; }
    .fields-grid { grid-template-columns: 1fr; }
    .client-block { grid-template-columns: 1fr; }
    .cert-footer { padding: 14px 24px; flex-direction: column; gap: 6px; text-align: center; }
  }
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><span>Generating…</span></div>

<div class="top-bar no-print">
  <h1>Waterproofing Certificate</h1>
  <span class="badge">Pearl Tiling &amp; Waterproofing</span>
</div>

<div class="export-row no-print">
  <button class="btn btn-pdf" onclick="exportPDF()">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h4a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
    Export PDF
  </button>
  <button class="btn btn-img" onclick="exportImage()">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
    Export Image
  </button>
  <button class="btn btn-reset" onclick="resetFields()">↺ Reset</button>
</div>

<!-- ══════════════════ CERTIFICATE ══════════════════ -->
<div id="certificate">

  <!-- HEADER -->
  <div class="cert-header">
    <h2>Waterproofing Certificate</h2>
    <div class="sub">AS 4654 &amp; AS 3740 Compliant</div>
  </div>

  <!-- CLIENT BLOCK -->
  <div class="client-block">
    <div class="field">
      <label>Client / Company Name</label>
      <input type="text" id="clientName" value="Francis Sandy" placeholder="Client or Company Name">
    </div>
    <div class="field">
      <label>Phone Number</label>
      <input type="tel" id="phone" value="0419 103 568" placeholder="0400 000 000">
    </div>
    <div class="field" style="grid-column: span 2;">
      <label>Job Address</label>
      <input type="text" id="jobAddress" value="47 Toorak Ave, Croydon" placeholder="Street, Suburb, State">
    </div>
  </div>

  <!-- JOB DETAILS -->
  <div class="cert-section">
    <div class="section-label">Job Details</div>
    <div class="fields-grid">
      <div class="field">
        <label>Completion Date</label>
        <input type="date" id="completionDate" value="2025-02-15">
      </div>
      <div class="field">
        <label>Area Treated</label>
        <input type="text" id="area" value="Wet areas" placeholder="e.g. Wet areas, Balcony">
      </div>
      <div class="field">
        <label>Number of Coats</label>
        <input type="text" id="coats" value="Two Coat waterproof" placeholder="e.g. Two Coat waterproof">
      </div>
      <div class="field">
        <label>Warranty Period</label>
        <input type="text" id="warranty" value="5 Years" placeholder="e.g. 5 Years">
      </div>
    </div>
  </div>

  <!-- CONTRACTOR DETAILS -->
  <div class="cert-section">
    <div class="section-label">Contractor Details</div>
    <div class="fields-grid">
      <div class="field">
        <label>Company Name</label>
        <input type="text" id="contractorName" value="Pearl Tiling And Waterproofing" placeholder="Company Name">
      </div>
      <div class="field">
        <label>ABN</label>
        <input type="text" id="abn" value="80 342 280 987" placeholder="XX XXX XXX XXX">
      </div>
      <div class="field" style="grid-column: span 2;">
        <label>Company Address</label>
        <input type="text" id="contractorAddress" value="7 Roxborough Street Tarneit 3029" placeholder="Street, Suburb, State Postcode">
      </div>
    </div>
  </div>

  <!-- PRODUCT -->
  <div class="cert-section">
    <div class="section-label">Product</div>
    <div class="fields-grid single">
      <div class="field">
        <label>Products Used</label>
        <textarea id="productsUsed" rows="2">eco prim T primer, Mapegum WPS Liquid Membrane, SIKA flex polyurethane and bandage</textarea>
      </div>
      <div class="field">
        <label>Product Description</label>
        <textarea id="productDesc" rows="3">Mapegum WPS is a premixed, extremely quick-drying waterproofing and anti-fracture membrane for installation under tile or stone in residential, commercial and industrial environments.</textarea>
      </div>
      <div class="field">
        <label>Technical Notes</label>
        <textarea id="techNotes" rows="3">Mapegum WPS membrane is anti-fracture membrane. The flexibility of Mapegum WPS enables it to withstand normal expansion and contraction movements of the substrate due to temperature variations and vibrations.</textarea>
      </div>
    </div>
  </div>

  <!-- WORKMANSHIP -->
  <div class="cert-section">
    <div class="section-label">Workmanship</div>
    <div class="fields-grid">
      <div class="field">
        <label>Applicator Name</label>
        <input type="text" id="applicator" value="Rouhullah Akbari" placeholder="Applicator full name">
      </div>
      <div class="field">
        <label>Australian Standard</label>
        <input type="text" id="standard" value="AS 4654 &amp; AS 3740" placeholder="e.g. AS 4654 &amp; AS 3740">
      </div>
      <div class="field" style="grid-column: span 2;">
        <label>Workmanship Statement</label>
        <textarea id="workmanship" rows="2">Pearl Tiling And Waterproofing recognizes that the applicator is trained and qualified in the installation of Pearl Tiling And Waterproofing Systems and the installation meets the Australian standard.</textarea>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="cert-footer">
    <span class="footer-text">This certificate is issued by the contractor named above.</span>
    <span class="stamp">Pearl Tiling &amp; Waterproofing</span>
  </div>

</div><!-- /certificate -->

<script>
  const { jsPDF } = window.jspdf;
  const DESKTOP_WIDTH = 860; // fixed export width — always looks like desktop

  function showLoading(show) {
    document.getElementById('loading').classList.toggle('show', show);
  }

  /* ── Build a hidden desktop-width clone for capture ── */
  function buildPrintClone() {
    const source = document.getElementById('certificate');

    // Wrapper forces the exact desktop width off-screen
    const wrapper = document.createElement('div');
    wrapper.style.cssText = `
      position: fixed;
      top: 0; left: -9999px;
      width: ${DESKTOP_WIDTH}px;
      background: #faf7f2;
      z-index: -1;
      overflow: visible;
    `;

    const clone = source.cloneNode(true);

    // Override any mobile-responsive styles on the clone
    clone.style.cssText = `
      width: ${DESKTOP_WIDTH}px;
      max-width: ${DESKTOP_WIDTH}px;
      border-radius: 0;
      box-shadow: none;
      overflow: visible;
    `;

    // Force all grid layouts inside clone to two-column desktop layout
    clone.querySelectorAll('.fields-grid').forEach(el => {
      if (!el.classList.contains('single')) {
        el.style.gridTemplateColumns = '1fr 1fr';
      }
    });
    clone.querySelectorAll('.client-block').forEach(el => {
      el.style.gridTemplateColumns = '1fr 1fr';
    });
    clone.querySelectorAll('.cert-footer').forEach(el => {
      el.style.flexDirection = 'row';
      el.style.padding = '18px 52px';
    });

    // Reset any mobile padding overrides
    clone.querySelectorAll('.cert-header, .cert-section, .client-block').forEach(el => {
      el.style.paddingLeft  = '52px';
      el.style.paddingRight = '52px';
    });

    // Restore span-2 on address fields
    clone.querySelectorAll('[style*="grid-column"]').forEach(el => {
      el.style.gridColumn = 'span 2';
    });

    // Replace inputs/textareas with plain text spans
    clone.querySelectorAll('input, textarea').forEach(el => {
      const span = document.createElement('span');
      span.style.cssText = `
        font-family:'DM Sans',sans-serif;
        font-size:.95rem;
        color:#1c1c1c;
        display:block;
        padding:5px 0;
        border-bottom:1.5px solid #d4c9b8;
        min-height:28px;
        line-height:1.55;
        white-space:pre-wrap;
        word-break:break-word;
      `;
      // Format date inputs nicely
      let val = el.value || el.placeholder || '';
      if (el.type === 'date' && val) {
        const [y,m,d] = val.split('-');
        if (d) val = `${d}/${m}/${y}`;
      }
      span.textContent = val;
      el.parentNode.replaceChild(span, el);
    });

    wrapper.appendChild(clone);
    document.body.appendChild(wrapper);
    return { wrapper, clone };
  }

  async function captureClone() {
    const { wrapper, clone } = buildPrintClone();
    await new Promise(r => setTimeout(r, 120)); // let fonts & layout settle
    const canvas = await html2canvas(clone, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#faf7f2',
      width: DESKTOP_WIDTH,
      windowWidth: DESKTOP_WIDTH,
      scrollX: 0,
      scrollY: 0,
    });
    document.body.removeChild(wrapper);
    return canvas;
  }

  async function exportPDF() {
    showLoading(true);
    try {
      const canvas = await captureClone();
      const imgData = canvas.toDataURL('image/jpeg', 0.95);
      const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      const pageW = pdf.internal.pageSize.getWidth();
      const pageH = pdf.internal.pageSize.getHeight();
      const ratio = canvas.width / canvas.height;
      const imgW = pageW - 20;
      const imgH = imgW / ratio;

      if (imgH <= pageH - 20) {
        pdf.addImage(imgData, 'JPEG', 10, 10, imgW, imgH);
      } else {
        // Slice across pages
        const sliceH = pageH - 20;
        const sliceHpx = sliceH * (canvas.width / imgW);
        let offsetPx = 0;
        let page = 0;
        while (offsetPx < canvas.height) {
          if (page > 0) pdf.addPage();
          pdf.addImage(imgData, 'JPEG', 10, 10 - page * sliceH, imgW, imgH);
          offsetPx += sliceHpx;
          page++;
        }
      }

      const name = document.getElementById('clientName').value.replace(/\s+/g,'_') || 'Certificate';
      pdf.save(`Waterproofing_Certificate_${name}.pdf`);
    } finally {
      showLoading(false);
    }
  }

  async function exportImage() {
    showLoading(true);
    try {
      const canvas = await captureClone();
      const link = document.createElement('a');
      const name = document.getElementById('clientName').value.replace(/\s+/g,'_') || 'Certificate';
      link.download = `Waterproofing_Certificate_${name}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    } finally {
      showLoading(false);
    }
  }

  function resetFields() {
    if (!confirm('Reset all fields to defaults?')) return;
    const defaults = {
      clientName: 'Francis Sandy', phone: '0419 103 568',
      jobAddress: '47 Toorak Ave, Croydon', completionDate: '2025-02-15',
      area: 'Wet areas', coats: 'Two Coat waterproof', warranty: '5 Years',
      contractorName: 'Pearl Tiling And Waterproofing', abn: '80 342 280 987',
      contractorAddress: '7 Roxborough Street Tarneit 3029',
      productsUsed: 'eco prim T primer, Mapegum WPS Liquid Membrane, SIKA flex polyurethane and bandage',
      productDesc: 'Mapegum WPS is a premixed, extremely quick-drying waterproofing and anti-fracture membrane for installation under tile or stone in residential, commercial and industrial environments.',
      techNotes: 'Mapegum WPS membrane is anti-fracture membrane. The flexibility of Mapegum WPS enables it to withstand normal expansion and contraction movements of the substrate due to temperature variations and vibrations.',
      applicator: 'Rouhullah Akbari', standard: 'AS 4654 & AS 3740',
      workmanship: 'Pearl Tiling And Waterproofing recognizes that the applicator is trained and qualified in the installation of Pearl Tiling And Waterproofing Systems and the installation meets the Australian standard.'
    };
    Object.entries(defaults).forEach(([id, val]) => {
      const el = document.getElementById(id);
      if (el) el.value = val;
    });
  }
</script>
</body>
</html>
